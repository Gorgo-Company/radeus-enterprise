<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADEUS — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="theme.css" rel="stylesheet">
<style>
  :root{
    --green:#00ff88;--cyan:#00f5ff;--red:#ff2244;--orange:#ff8800;
    --bg:#020c06;--bg2:#011a0a;--border:rgba(0,255,136,.18);
    --border-hi:rgba(0,255,136,.45);--text:#c8f0d8;--text-dim:#2a6a45;--text-mid:#5a9a75;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
    pointer-events:none;z-index:0;}

  /* Subtle grid background */
  body::after{content:'';position:fixed;inset:0;
    background:
      linear-gradient(rgba(0,255,136,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,255,136,.04) 1px,transparent 1px);
    background-size:60px 60px;pointer-events:none;z-index:0;}

  .corner{position:fixed;width:48px;height:48px;border-color:var(--green);border-style:solid;opacity:.25;z-index:2;}
  .tl{top:10px;left:10px;border-width:2px 0 0 2px}
  .tr{top:10px;right:10px;border-width:2px 2px 0 0}
  .bl{bottom:10px;left:10px;border-width:0 0 2px 2px}
  .br{bottom:10px;right:10px;border-width:0 2px 2px 0}

  .card{position:relative;z-index:1;width:420px;max-width:94vw;
    background:rgba(2,12,6,.96);border:1px solid var(--border-hi);
    box-shadow:0 0 80px rgba(0,255,136,.07),0 0 200px rgba(0,255,136,.03);}

  .card-top{padding:36px 36px 28px;border-bottom:1px solid var(--border);
    background:linear-gradient(135deg,rgba(0,255,136,.05),transparent);text-align:center;}

  .logo{font-family:'Orbitron',monospace;font-weight:900;font-size:32px;
    color:var(--green);letter-spacing:10px;
    text-shadow:0 0 30px rgba(0,255,136,.6),0 0 80px rgba(0,255,136,.2);
    margin-bottom:10px;display:block;}

  .tagline{font-family:'Share Tech Mono',monospace;font-size:9px;
    color:var(--text-dim);letter-spacing:4px;margin-bottom:4px;}

  .version{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:2px;}

  .card-body{padding:32px 36px;}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
  .flabel{font-family:'Share Tech Mono',monospace;font-size:8px;
    color:var(--text-mid);letter-spacing:2.5px;}

  .finput{background:rgba(0,255,136,.04);border:1px solid rgba(0,255,136,.22);
    color:var(--green);font-family:'Share Tech Mono',monospace;font-size:12px;
    padding:11px 14px;outline:none;width:100%;transition:all .15s;letter-spacing:.5px;}
  .finput:focus{border-color:var(--border-hi);background:rgba(0,255,136,.07);}
  .finput::placeholder{color:var(--text-dim);}

  .login-btn{width:100%;padding:13px;font-family:'Orbitron',monospace;font-size:10px;
    letter-spacing:3px;border:1px solid var(--green);color:var(--green);
    background:rgba(0,255,136,.06);cursor:pointer;transition:all .2s;margin-top:6px;
    position:relative;overflow:hidden;}
  .login-btn:hover:not(:disabled){background:rgba(0,255,136,.14);
    box-shadow:0 0 20px rgba(0,255,136,.15);}
  .login-btn:disabled{opacity:.5;cursor:not-allowed;}
  .login-btn.loading::after{content:'';position:absolute;bottom:0;left:0;
    height:2px;background:var(--green);animation:btnLoad 1.2s ease-in-out infinite;}
  @keyframes btnLoad{0%{width:0;left:0}50%{width:100%;left:0}100%{width:0;left:100%}}

  .error-msg{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--red);
    letter-spacing:1px;padding:10px 12px;border:1px solid rgba(255,34,68,.3);
    background:rgba(255,34,68,.05);margin-top:14px;display:none;line-height:1.5;}
  .error-msg.show{display:block;}

  .card-footer{padding:16px 36px;border-top:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;}
  .portal-link{font-family:'Share Tech Mono',monospace;font-size:8px;
    color:var(--text-dim);letter-spacing:1px;text-decoration:none;transition:color .15s;}
  .portal-link:hover{color:var(--green);}
  .secure-badge{font-family:'Share Tech Mono',monospace;font-size:8px;
    color:var(--text-dim);letter-spacing:1px;display:flex;align-items:center;gap:5px;}
  .secure-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
    box-shadow:0 0 5px var(--green);}

  /* Scan line on load */
  .scan{position:fixed;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,rgba(0,255,136,.8),transparent);
    animation:scan 1.8s ease-out forwards;pointer-events:none;z-index:10;}
  @keyframes scan{0%{top:0;opacity:0}5%{opacity:1}90%{opacity:.4}100%{top:100vh;opacity:0}}
</style>
</head>
<body>
<div class="scan"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="card">
  <div class="card-top">
    <span class="logo">RADEUS</span>
    <div class="tagline">WATER UTILITY MANAGEMENT PLATFORM</div>
    <div class="version">OPERATOR ACCESS — SECURE SIGN IN</div>
  </div>

  <div class="card-body">
    <div class="field">
      <label class="flabel">EMAIL ADDRESS</label>
      <input class="finput" id="emailInput" type="email" placeholder="operator@waterdistrict.org" autocomplete="email">
    </div>
    <div class="field">
      <label class="flabel">PASSWORD</label>
      <input class="finput" id="passwordInput" type="password" placeholder="••••••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">SIGN IN TO RADEUS</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="card-footer">
    <a class="portal-link" href="portal.html">⬡ CUSTOMER PORTAL →</a>
    <div class="secure-badge"><div class="secure-dot"></div>SECURED BY SUPABASE AUTH</div>
  </div>
</div>

<script>
const SUPA_URL='https://bvpesxpptgdwkhsewhke.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2cGVzeHBwdGdkd2toc2V3aGtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzcwNTksImV4cCI6MjA5MTk1MzA1OX0._th9UdQKqIWvqgTrxxpd5IfTlexCUeyWC5aGwRJYZj8';
const SESSION_KEY='radeus_session';

// If already logged in as staff, skip to app
(function(){
  try{
    const s=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
    const st=JSON.parse(localStorage.getItem('radeus_staff')||'null');
    if(s&&st&&s.expires_at>Date.now()/1000){window.location.href='index.html';}
  }catch{}
})();

function showError(msg){const el=document.getElementById('errorMsg');el.textContent=msg;el.classList.add('show');}
function clearError(){document.getElementById('errorMsg').classList.remove('show');}

document.getElementById('passwordInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')doLogin();
});
document.getElementById('emailInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')document.getElementById('passwordInput').focus();
});

async function doLogin(){
  clearError();
  const email=document.getElementById('emailInput').value.trim();
  const password=document.getElementById('passwordInput').value;
  if(!email||!password){showError('EMAIL AND PASSWORD ARE REQUIRED');return;}

  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.classList.add('loading');btn.textContent='AUTHENTICATING...';

  try{
    // 1. Authenticate with Supabase Auth
    const authRes=await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    const authData=await authRes.json();
    if(!authRes.ok)throw new Error(authData.error_description||authData.msg||'AUTHENTICATION FAILED');

    const session={
      access_token:authData.access_token,
      refresh_token:authData.refresh_token,
      expires_at:authData.expires_at||Math.floor(Date.now()/1000)+3600,
      user:authData.user
    };

    // 2. Look up staff record
    const staffRes=await fetch(
      `${SUPA_URL}/rest/v1/staff?auth_user_id=eq.${authData.user.id}&select=staff_id,name,role,email,active,org_id&limit=1`,
      {headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${authData.access_token}`}}
    );
    const staffData=await staffRes.json();

    if(staffData?.length&&staffData[0].active){
      // Operator login
      localStorage.setItem(SESSION_KEY,JSON.stringify(session));
      localStorage.setItem('radeus_staff',JSON.stringify({...staffData[0],_user_id:authData.user.id}));
      window.location.href='index.html';
      return;
    }

    // 3. Check customer table
    const custRes=await fetch(
      `${SUPA_URL}/rest/v1/customers?auth_user_id=eq.${authData.user.id}&select=customer_id,full_name,email&limit=1`,
      {headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${authData.access_token}`}}
    );
    const custData=await custRes.json();

    if(custData?.length){
      // Customer — send to portal
      localStorage.setItem('radeus_portal_session',JSON.stringify(session));
      localStorage.setItem('radeus_customer',JSON.stringify({...custData[0],_user_id:authData.user.id}));
      window.location.href='portal.html';
      return;
    }

    // Authenticated but no matching record
    showError('ACCOUNT NOT FOUND. CONTACT YOUR SYSTEM ADMINISTRATOR.');

  }catch(e){
    showError(e.message||'SIGN IN FAILED. CHECK CREDENTIALS AND TRY AGAIN.');
  }finally{
    btn.disabled=false;btn.classList.remove('loading');btn.textContent='SIGN IN TO RADEUS';
  }
}
</script>
</body>
</html>
