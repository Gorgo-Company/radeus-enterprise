<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADEUS — Payments</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:#2c7ba2;--primary-soft:#d9ebf4;
    --success:#348b67;--warning:#b8822f;--danger:#bf6157;--info:#4f8fbe;
    --bg:#eef4f7;--bg2:#e4edf2;
    --surface:rgba(255,255,255,0.94);--surface-strong:#ffffff;
    --border:rgba(150,177,193,0.34);--border-strong:rgba(120,154,176,0.52);
    --shadow:0 16px 42px rgba(49,83,105,0.10);
    --text:#18384a;--text-soft:#5f7b8c;--text-muted:#8fa6b4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    background:radial-gradient(circle at top left,rgba(124,175,205,0.20),transparent 30%),linear-gradient(180deg,#f7fbfd 0%,var(--bg) 100%);
    color:var(--text);font-family:"Aptos","Segoe UI","Helvetica Neue",Arial,sans-serif;overflow:hidden;height:100vh;width:100vw;
  }

  /* TOPBAR */
  .topbar{position:fixed;top:0;left:0;right:0;height:58px;background:rgba(248,251,253,0.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;box-shadow:0 8px 22px rgba(80,114,138,0.08);}
  .logo{font-family:'Orbitron',monospace;font-weight:900;font-size:20px;color:var(--primary);letter-spacing:0.42rem;text-shadow:none;text-decoration:none;}
  .sys-select{background:rgba(255,255,255,0.90);border:1px solid var(--border-strong);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:4px 12px;letter-spacing:1px;cursor:pointer;outline:none;border-radius:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.70);}
  .sys-select option{background:#fff;color:var(--text);}
  .sdot{width:7px;height:7px;border-radius:50%;background:var(--success);box-shadow:0 0 0 5px rgba(52,139,103,0.16);animation:blink 2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  #clock{color:var(--text-soft);font-size:13px;letter-spacing:2px;font-family:'Share Tech Mono',monospace;}

  /* CONTROL BAR */
  .controlbar{position:fixed;top:58px;left:0;right:0;height:52px;background:rgba(248,251,253,0.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;z-index:99;box-shadow:0 8px 22px rgba(80,114,138,0.08);overflow-x:auto;}
  .ctrl-group{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .ctrl-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-muted);letter-spacing:2px;white-space:nowrap;}
  .ctrl-divider{width:1px;height:32px;background:var(--border);margin:0 4px;flex-shrink:0;}
  .date-input{background:rgba(255,255,255,0.90);border:1px solid var(--border-strong);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:5px 8px;outline:none;width:132px;flex-shrink:0;border-radius:12px;}
  .date-input:focus{border-color:var(--primary);}
  .range-btn{font-family:'Orbitron',monospace;font-size:7px;padding:5px 10px;border:1px solid var(--border-strong);color:var(--text-soft);background:rgba(255,255,255,0.88);cursor:pointer;letter-spacing:1px;transition:all .15s;flex-shrink:0;white-space:nowrap;border-radius:12px;}
  .range-btn:hover,.range-btn.active{border-color:rgba(44,123,162,0.45);color:var(--primary);background:var(--primary-soft);}
  .search-wrap{flex:1;min-width:180px;position:relative;}
  .search-wrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--primary);font-size:16px;pointer-events:none;opacity:.5;}
  .search-input{width:100%;background:rgba(255,255,255,0.90);border:1px solid var(--border-strong);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:12px;padding:6px 10px 6px 32px;outline:none;letter-spacing:.5px;border-radius:12px;}
  .search-input::placeholder{color:var(--text-muted);}
  .search-input:focus{border-color:var(--primary);}
  .ctrl-btn{font-family:'Orbitron',monospace;font-size:8px;padding:7px 13px;border:1px solid var(--border-strong);cursor:pointer;letter-spacing:1px;transition:all .15s;white-space:nowrap;background:rgba(255,255,255,0.88);flex-shrink:0;color:var(--text-soft);border-radius:12px;}
  .ctrl-btn-primary{border-color:rgba(52,139,103,0.45);color:var(--success);}
  .ctrl-btn-primary:hover{background:rgba(52,139,103,0.08);}
  .ctrl-btn-dim{border-color:var(--border-strong);color:var(--text-muted);}
  .ctrl-btn-dim:hover{border-color:rgba(44,123,162,0.38);color:var(--primary);}

  /* STATS BAR */
  .statsbar{position:fixed;top:110px;left:0;right:0;height:56px;background:rgba(248,251,253,0.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:stretch;z-index:98;box-shadow:0 8px 22px rgba(80,114,138,0.08);}
  .stat-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 18px;border-right:1px solid var(--border);flex:1;min-width:0;overflow:hidden;background:rgba(248,251,253,0.82);}
  .stat-cell:last-child{border-right:none;}
  .stat-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-muted);letter-spacing:2px;white-space:nowrap;}
  .stat-val{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;letter-spacing:.5px;white-space:nowrap;color:var(--text);text-shadow:none;}
  .sv-green{color:var(--success);}.sv-yellow{color:var(--warning);}.sv-red{color:var(--danger);}.sv-cyan{color:var(--primary);}.sv-orange{color:var(--warning);}.sv-dim{color:var(--text-muted);}

  /* FILTER BAR */
  .filterbar{position:fixed;top:166px;left:0;right:0;height:36px;background:rgba(248,251,253,0.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:6px;z-index:97;}
  .fbtn{font-size:8px;padding:4px 10px;border:1px solid var(--border-strong);color:var(--text-soft);background:rgba(255,255,255,0.88);cursor:pointer;font-family:'Share Tech Mono',monospace;letter-spacing:1px;transition:all .15s;white-space:nowrap;border-radius:12px;}
  .fbtn:hover,.fbtn.active{border-color:rgba(44,123,162,0.45);color:var(--primary);background:var(--primary-soft);}
  .method-select{background:rgba(255,255,255,0.90);border:1px solid var(--border-strong);color:var(--text-soft);font-family:'Share Tech Mono',monospace;font-size:8px;padding:3px 8px;letter-spacing:1px;cursor:pointer;outline:none;border-radius:12px;}
  .method-select:focus,.method-select:hover{border-color:rgba(44,123,162,0.45);color:var(--primary);}
  .method-select option{background:#fff;color:var(--text);}
  .filter-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .row-count{font-family:'Orbitron',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1px;}

  /* MAIN */
  .main{position:fixed;top:202px;bottom:78px;left:0;right:0;overflow-y:auto;transition:right .25s ease;}
  .main.panel-open{right:520px;}

  /* TABLE */
  .atable{width:100%;border-collapse:collapse;}
  .atable thead{position:sticky;top:0;z-index:10;}
  .atable th{font-family:'Orbitron',monospace;font-size:7px;letter-spacing:1.5px;color:var(--text-soft);padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;font-weight:400;background:rgba(243,248,251,0.98);white-space:nowrap;cursor:pointer;user-select:none;}
  .atable th:hover{color:var(--primary);}
  .atable th.sort-asc::after{content:' ▲';color:var(--primary);}
  .atable th.sort-desc::after{content:' ▼';color:var(--primary);}
  .atable th.r{text-align:right;}
  .atable td{padding:7px 12px;border-bottom:1px solid rgba(150,177,193,0.18);vertical-align:middle;font-size:13px;color:var(--text);}
  .atable tr:hover td{background:rgba(223,237,245,0.55);cursor:pointer;}
  .atable tr.selected td{background:rgba(44,123,162,.08);border-left:2px solid var(--primary);}
  .atable tr.row-returned td{opacity:.65;}

  .td-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block;}
  .dot-dep{background:var(--success);}
  .dot-undep{background:rgba(184,130,47,.5);border:1px solid var(--warning);}
  .dot-ret{background:var(--danger);}
  .td-date{color:var(--text-soft);font-family:'Share Tech Mono',monospace;font-size:11px;white-space:nowrap;}
  .td-acct{color:var(--primary);font-family:'Share Tech Mono',monospace;font-size:10px;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;}
  .td-name{color:var(--text);font-size:13px;font-weight:600;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;}
  .td-amount{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--success);text-align:right;white-space:nowrap;}
  .td-method{font-family:'Share Tech Mono',monospace;font-size:9px;white-space:nowrap;}
  .td-ref{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-muted);white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;}
  .td-flag{text-align:center;}
  .flag-yes{color:var(--success);font-size:11px;}
  .flag-no{color:var(--text-muted);font-size:11px;}
  .flag-ret{color:var(--danger);font-size:11px;}

  /* METHOD PILLS */
  .mpill{font-family:'Orbitron',monospace;font-size:7px;padding:2px 7px;border:1px solid;letter-spacing:1px;white-space:nowrap;border-radius:999px;background:rgba(255,255,255,0.80);}
  .mp-check{border-color:rgba(44,123,162,.45);color:var(--primary);}
  .mp-cash{border-color:rgba(52,139,103,.45);color:var(--success);}
  .mp-square{border-color:rgba(79,143,190,.45);color:var(--info);}
  .mp-ach{border-color:rgba(125,142,182,.45);color:#7d8eb6;}
  .mp-mo{border-color:rgba(184,130,47,.45);color:var(--warning);}
  .mp-other{border-color:var(--border-strong);color:var(--text-muted);}

  .img-indicator{width:24px;height:24px;border:1px solid var(--border-strong);background:rgba(255,255,255,0.88);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all .15s;border-radius:8px;}
  .img-indicator.has-img{border-color:rgba(44,123,162,.45);color:var(--primary);background:var(--primary-soft);}
  .img-indicator:hover{border-color:rgba(44,123,162,.45);color:var(--primary);}
  .open-btn{background:rgba(255,255,255,0.88);border:1px solid var(--border-strong);color:var(--text-soft);font-family:'Orbitron',monospace;font-size:8px;padding:3px 7px;cursor:pointer;letter-spacing:1px;transition:all .15s;white-space:nowrap;border-radius:12px;}
  .open-btn:hover{border-color:rgba(44,123,162,.45);color:var(--primary);background:var(--primary-soft);}

  /* EMPTY / LOADING */
  .loading-row td{color:var(--text-soft);font-size:10px;letter-spacing:2px;text-align:center;padding:60px;font-family:'Share Tech Mono',monospace;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:14px;}
  .empty-icon{font-size:52px;opacity:.25;}
  .empty-msg{font-family:'Orbitron',monospace;font-size:11px;color:var(--text-muted);letter-spacing:3px;}
  .empty-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1px;opacity:.6;}

  /* DETAIL PANEL */
  .detail-panel{position:fixed;top:0;right:-520px;bottom:78px;width:520px;background:var(--surface-strong);border-left:1px solid var(--border-strong);z-index:300;display:flex;flex-direction:column;transition:right .25s ease;box-shadow:-20px 0 60px rgba(0,0,0,.15);}
  .detail-panel.open{right:0;}
  .dp-header{padding:14px 18px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(216,235,244,0.65),rgba(255,255,255,0.72));position:relative;flex-shrink:0;}
  .dp-title{font-family:'Orbitron',monospace;font-size:11px;color:var(--primary);letter-spacing:3px;margin-bottom:3px;}
  .dp-id{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1px;}
  .dp-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;line-height:1;}
  .dp-close:hover{color:var(--danger);}
  .dp-body{flex:1;overflow-y:auto;padding:0;}
  .dp-footer{flex-shrink:0;padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;}
  .dp-section{border-bottom:1px solid var(--border);}
  .dp-section-title{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:var(--primary);padding:8px 18px;background:rgba(243,248,251,0.82);border-bottom:1px solid var(--border);}
  .dp-row{display:flex;justify-content:space-between;align-items:center;padding:7px 18px;border-bottom:1px solid var(--border);}
  .dp-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-muted);letter-spacing:1px;}
  .dp-val{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text);text-align:right;}
  .dp-val-money{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:24px;color:var(--success);}
  .dp-val-acct{font-family:'Orbitron',monospace;font-size:10px;color:var(--primary);letter-spacing:1px;}
  .dp-form{padding:14px 18px;}
  .ef-row{margin-bottom:12px;}
  .ef-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .ef-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-muted);letter-spacing:2px;margin-bottom:4px;display:block;}
  .ef-input{width:100%;background:rgba(255,255,255,0.90);border:1px solid var(--border-strong);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:7px 10px;outline:none;transition:all .15s;border-radius:12px;}
  .ef-input:focus{border-color:var(--primary);}
  .ef-input option{background:#fff;color:var(--text);}
  .ef-input::placeholder{color:var(--text-muted);}

  /* TOGGLES */
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 18px;border-bottom:1px solid var(--border);}
  .toggle-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-soft);letter-spacing:1px;}
  .toggle{position:relative;width:40px;height:20px;cursor:pointer;}
  .toggle input{opacity:0;width:0;height:0;}
  .toggle-track{position:absolute;inset:0;background:rgba(150,177,193,.15);border:1px solid var(--border-strong);transition:.2s;border-radius:999px;}
  .toggle-thumb{position:absolute;height:14px;width:14px;top:2px;left:2px;background:var(--text-muted);transition:.2s;border-radius:999px;}
  .toggle input:checked + .toggle-track{background:rgba(52,139,103,.15);border-color:var(--success);}
  .toggle input:checked ~ .toggle-thumb{transform:translateX(20px);background:var(--success);}

  /* IMAGE AREA */
  .img-area{padding:14px 18px;border-bottom:1px solid var(--border);}
  .img-area-title{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-muted);letter-spacing:2px;margin-bottom:10px;}
  .img-preview{width:100%;max-height:200px;object-fit:contain;border:1px solid var(--border-strong);background:rgba(243,248,251,0.5);cursor:pointer;border-radius:8px;}
  .img-placeholder{height:80px;border:1px dashed var(--border-strong);display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .2s;border-radius:8px;}
  .img-placeholder:hover{border-color:var(--primary);background:var(--primary-soft);}
  .img-placeholder-text{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1px;}
  .img-actions{display:flex;gap:8px;margin-top:8px;}
  .img-btn{flex:1;font-family:'Orbitron',monospace;font-size:7px;padding:6px;border:1px solid var(--border-strong);color:var(--text-soft);background:rgba(255,255,255,0.88);cursor:pointer;letter-spacing:1px;transition:all .15s;text-align:center;border-radius:12px;}
  .img-btn:hover{border-color:rgba(44,123,162,.45);color:var(--primary);background:var(--primary-soft);}

  /* DETAIL BUTTONS */
  .dp-btn{flex:1;padding:9px;font-family:'Orbitron',monospace;font-size:7px;letter-spacing:1px;cursor:pointer;border:1px solid var(--border-strong);transition:all .15s;background:rgba(255,255,255,0.88);color:var(--text-soft);text-align:center;white-space:nowrap;border-radius:12px;}
  .dp-btn-green{border-color:rgba(52,139,103,0.45);color:var(--success);}
  .dp-btn-green:hover{background:rgba(52,139,103,0.08);}
  .dp-btn-cyan{border-color:rgba(44,123,162,0.45);color:var(--primary);}
  .dp-btn-cyan:hover{background:var(--primary-soft);}
  .dp-btn-orange{border-color:rgba(184,130,47,0.45);color:var(--warning);}
  .dp-btn-orange:hover{background:rgba(184,130,47,0.08);}
  .dp-btn-red{border-color:rgba(191,97,87,0.35);color:var(--danger);}
  .dp-btn-red:hover{background:rgba(191,97,87,0.08);}
  .dp-btn-ghost{border-color:var(--border-strong);color:var(--text-muted);}
  .dp-btn-ghost:hover{border-color:rgba(44,123,162,0.38);color:var(--primary);}

  /* LIGHTBOX */
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:800;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
  .lightbox.show{display:flex;}
  .lightbox img{max-width:88vw;max-height:74vh;border:1px solid var(--border-strong);box-shadow:var(--shadow);border-radius:12px;}
  .lb-close{font-family:'Orbitron',monospace;font-size:10px;color:var(--danger);border:1px solid rgba(191,97,87,.35);padding:8px 22px;cursor:pointer;letter-spacing:2px;background:rgba(191,97,87,.08);border-radius:12px;}
  .lb-caption{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1px;}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(133,161,178,0.45);border-radius:999px;}

  /* TOAST */
  .toast{position:fixed;bottom:88px;right:20px;background:var(--surface-strong);border:1px solid var(--primary);padding:10px 18px;font-family:'Orbitron',monospace;font-size:9px;color:var(--primary);letter-spacing:2px;z-index:900;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px;line-height:1.5;border-radius:12px;box-shadow:var(--shadow);}
  .toast.show{opacity:1;}
  .toast.t-err{border-color:var(--danger);color:var(--danger);}
  .toast.t-ok{border-color:var(--success);color:var(--success);}
  .toast.t-warn{border-color:var(--warning);color:var(--warning);}

  /* BOTTOM NAV */
  .botnav{position:fixed;bottom:0;left:0;right:0;height:78px;background:rgba(248,251,253,0.92);backdrop-filter:blur(18px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;padding:0 16px;z-index:100;box-shadow:0 -8px 22px rgba(80,114,138,0.08);}
  .navbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;width:72px;height:62px;background:rgba(255,255,255,0.88);border:1px solid var(--border-strong);color:var(--text-soft);cursor:pointer;transition:all .2s;font-size:8px;letter-spacing:1px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;position:relative;overflow:hidden;text-decoration:none;border-radius:12px;box-shadow:none;}
  .navbtn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--primary);transform:scaleX(0);transition:transform .2s;}
  .navbtn:hover::after,.navbtn.active::after{transform:scaleX(1);}
  .navbtn:hover{color:var(--primary);border-color:rgba(44,123,162,0.38);}
  .navbtn.active{color:var(--primary);border-color:rgba(44,123,162,0.45);background:var(--primary-soft);}
  .navicon{font-size:20px;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a class="logo" href="index.html">RADEUS</a>
  <div style="display:flex;align-items:center;gap:14px">
    <div class="sdot"></div>
    <span style="font-size:12px;color:var(--text-soft);letter-spacing:3px;font-family:'Share Tech Mono',monospace">PAYMENTS</span>
    <select class="sys-select" id="sysSelect" onchange="switchSystem(this.value)">
      <option value="">⬡ LOADING...</option>
    </select>
    <span id="sys-count" style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1px;"></span>
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <span style="font-size:9px;color:var(--text-soft);font-family:'Share Tech Mono',monospace">OPERATOR: <span id="operatorName" style="color:var(--text)">—</span></span>
    <span id="clock">--:--:--</span>
  </div>
</div>

<!-- CONTROL BAR -->
<div class="controlbar">
  <div class="ctrl-group"><span class="ctrl-label">FROM</span><input class="date-input" type="date" id="dateFrom" onchange="loadPayments()"></div>

<script>

const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2cGVzeHBwdGdkd2toc2V3aGtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzcwNTksImV4cCI6MjA5MTk1MzA1OX0._th9UdQKqIWvqgTrxxpd5IfTlexCUeyWC5aGwRJYZj8';
let ORG_ID=null;
const BUCKET='payment-images';
let activeSystemId=null,allSystems=[],allPayments=[],filtered=[],allAccounts=[],currentFilter='ALL',currentMethod='',selectedPayment=null,panelMode=null,pendingImageFile=null,pendingImageUrl=null,sortCol='payment_date',sortDir='desc';
const MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function tick(){document.getElementById('clock').textContent=new Date().toTimeString().slice(0,8);}
setInterval(tick,1000);tick();
async function supa(table,params='',method='GET',body=null){try{const opts={method,headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=representation','Accept':'application/json'}};if(body)opts.body=JSON.stringify(body);const r=await fetch(`${SUPA_URL}/rest/v1/${table}${params}`,opts);if(!r.ok){console.error('Supa',r.status,await r.text());return null;}const txt=await r.text();return txt?JSON.parse(txt):null;}catch(e){console.warn('Supa offline:',e.message);return null;}}
function toast(msg,type='',dur=2800){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(type?' t-'+type:'');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),dur);}
function fmtMoney(n){if(n===null||n===undefined)return'—';return'$'+Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fmtDate(s){if(!s)return'—';const d=new Date(s+'T00:00:00');return`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}/${d.getFullYear()}`;}
function today(){return new Date().toISOString().split('T')[0];}
function methodPill(m){if(!m)return'<span class="mpill mp-other">—</span>';const u=(m||'').toUpperCase();const cls=u==='CHECK'?'mp-check':u==='CASH'?'mp-cash':u==='SQUARE'?'mp-square':u==='ACH'?'mp-ach':u.includes('MONEY')||u==='MO'?'mp-mo':'mp-other';return`<span class="mpill ${cls}">${u}</span>`;}
function setRange(range,btn){document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const now=new Date();const yr=now.getFullYear();const mo=now.getMonth();let from,to;if(range==='month'){from=new Date(yr,mo,1).toISOString().split('T')[0];to=new Date(yr,mo+1,0).toISOString().split('T')[0];}else if(range==='last'){from=new Date(yr,mo-1,1).toISOString().split('T')[0];to=new Date(yr,mo,0).toISOString().split('T')[0];}else if(range==='ytd'){from=`${yr}-01-01`;to=today();}else{from='2020-01-01';to=today();}document.getElementById('dateFrom').value=from;document.getElementById('dateTo').value=to;loadPayments();}
async function loadSystems(){if(!ORG_ID)return;const systems=await supa('water_systems',`?org_id=eq.${ORG_ID}&select=system_id,system_name,system_code&order=system_name`);if(!systems?.length){toast('NO SYSTEMS FOUND','err');return;}allSystems=systems;const sel=document.getElementById('sysSelect');sel.innerHTML=`<option value="">⬡ ALL SYSTEMS</option>`+systems.map(s=>`<option value="${s.system_id}">⬡ ${s.system_name.toUpperCase()}</option>`).join('');activeSystemId='';const sc=document.getElementById('sys-count');if(sc)sc.textContent=`${systems.length} SYSTEMS`;setRange('all',document.getElementById('rb-all'));loadAccounts();ensureImageBucket();}
function switchSystem(id){activeSystemId=id;allPayments=[];filtered=[];selectedPayment=null;closePanel();loadPayments();loadAccounts();}
function sysFilter(){if(!activeSystemId)return allSystems.length?`system_id=in.(${allSystems.map(s=>s.system_id).join(',')})`:null;return`system_id=eq.${activeSystemId}`;}
function sysParam(){const f=sysFilter();return f?`&${f}`:'';}

async function loadAccounts(){const sp=sysParam();if(!sp&&!allSystems.length)return;const accts=await supa('accounts',`?status=eq.ACTIVE${sp}&select=account_id,account_number,system_id,customers(full_name)&order=account_number`);allAccounts=accts||[];buildAcctDatalist();}
function buildAcctDatalist(){let dl=document.getElementById('acct-dl');if(!dl){dl=document.createElement('datalist');dl.id='acct-dl';document.body.appendChild(dl);}dl.innerHTML=allAccounts.map(a=>`<option value="${a.account_number}">${a.account_number} — ${a.customers?.full_name||''}`).join('');}
async function loadPayments(){const from=document.getElementById('dateFrom').value;const to=document.getElementById('dateTo').value;if(!from||!to)return;const sf=sysFilter();if(!sf&&!allSystems.length)return;document.getElementById('mainArea').innerHTML=`<div class="empty-state"><div class="empty-icon" style="font-size:28px;animation:blink 1s infinite">⬡</div><div class="empty-msg">LOADING PAYMENTS...</div></div>`;const params=`?payment_date=gte.${from}&payment_date=lte.${to}${sysParam()}&select=payment_id,account_id,system_id,payment_date,amount,payee,payment_method,reference_number,deposited,deposit_batch_date,returned,return_date,return_reason,return_debit_posted,in_closed_cycle,source_id,posted_by,notes,image_url,created_at,accounts(account_number,customers(full_name)),water_systems(system_name,system_code)&order=payment_date.desc,created_at.desc`;const data=await supa('payments',params);allPayments=data||[];loadStats(from,to);applyFilters();}

// Paginated fetch of all payment amounts for accurate totals (bypasses row limits)
async function fetchAllAmounts(from,to){const sp=sysParam();const baseUrl=`${SUPA_URL}/rest/v1/payments?payment_date=gte.${from}&payment_date=lte.${to}${sp}&select=amount,returned,deposited`;let all=[];let offset=0;const page=1000;while(true){try{const r=await fetch(baseUrl,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Range':`${offset}-${offset+page-1}`,'Range-Unit':'items','Prefer':'count=exact'}});if(!r.ok)break;const txt=await r.text();const data=txt?JSON.parse(txt):[];if(!data.length)break;all=all.concat(data);if(data.length<page)break;offset+=page;}catch(e){break;}}return all;}
async function loadStats(from,to){const ytdStart=`${new Date().getFullYear()}-01-01`;const sp=sysParam();const[ytdData,balances,cycleData]=await Promise.all([supa('payments',`?payment_date=gte.${ytdStart}${sp}&select=amount&returned=eq.false`),supa('account_balances',`?${sysFilter()||'system_id=not.is.null'}&select=current_balance`),activeSystemId?supa('billing_cycles',`?system_id=eq.${activeSystemId}&status=eq.OPEN&select=cycle_id,cycle_year,cycle_month&limit=1`):Promise.resolve(null)]);const ytdTotal=(ytdData||[]).reduce((s,p)=>s+parseFloat(p.amount||0),0);document.getElementById('stat-ytd').textContent=fmtMoney(ytdTotal);const outstanding=(balances||[]).reduce((s,b)=>s+Math.max(0,parseFloat(b.current_balance||0)),0);document.getElementById('stat-outstanding').textContent=fmtMoney(outstanding);if(cycleData?.length){const cycle=cycleData[0];const cycleFrom=`${cycle.cycle_year}-${String(cycle.cycle_month).padStart(2,'0')}-01`;const cycleTo=new Date(cycle.cycle_year,cycle.cycle_month,0).toISOString().split('T')[0];const mthPay=await supa('payments',`?system_id=eq.${activeSystemId}&payment_date=gte.${cycleFrom}&payment_date=lte.${cycleTo}&returned=eq.false&select=amount`);const totalRcvd=(mthPay||[]).reduce((s,p)=>s+parseFloat(p.amount||0),0);const cycleBills=await supa('bills',`?cycle_id=eq.${cycle.cycle_id}&select=total_amount`);const totalBilled=(cycleBills||[]).reduce((s,b)=>s+parseFloat(b.total_amount||0),0);const pct=totalBilled>0?Math.round((totalRcvd/totalBilled)*100):null;document.getElementById('stat-cycle-pct').textContent=pct!==null?pct+'%':'—';}else{document.getElementById('stat-cycle-pct').textContent='—';}}
function applyFilters(){const search=(document.getElementById('searchInput')?.value||'').toLowerCase().trim();const method=document.getElementById('methodFilter')?.value||'';filtered=allPayments.filter(p=>{if(currentFilter==='UNDEPOSITED'&&(p.deposited||p.returned))return false;if(currentFilter==='DEPOSITED'&&!p.deposited)return false;if(currentFilter==='RETURNED'&&!p.returned)return false;if(method&&(p.payment_method||'').toUpperCase()!==method.toUpperCase())return false;if(search){const acct=(p.accounts?.account_number||'').toLowerCase();const name=(p.accounts?.customers?.full_name||'').toLowerCase();const payee=(p.payee||'').toLowerCase();const ref=(p.reference_number||'').toLowerCase();const mth=(p.payment_method||'').toLowerCase();const notes=(p.notes||'').toLowerCase();const amt=String(p.amount||'');const date=(p.payment_date||'').toLowerCase();if(![acct,name,payee,ref,mth,notes,amt,date].some(f=>f.includes(search)))return false;}return true;});updateInlineStats();renderTable();}
function updateInlineStats(){
  // Use allPayments for row count / filter-based stats
  const periodTotal=filtered.filter(p=>!p.returned).reduce((s,p)=>s+parseFloat(p.amount||0),0);
  const undep=filtered.filter(p=>!p.deposited&&!p.returned).reduce((s,p)=>s+parseFloat(p.amount||0),0);
  const retAmt=filtered.filter(p=>p.returned).reduce((s,p)=>s+parseFloat(p.amount||0),0);
  const retCount=filtered.filter(p=>p.returned).length;
  document.getElementById('stat-period').textContent=fmtMoney(periodTotal);
  document.getElementById('stat-undep').textContent=fmtMoney(undep);
  document.getElementById('stat-returned').textContent=retCount>0?`${retCount} / ${fmtMoney(retAmt)}`:'$0.00';
  document.getElementById('rowCount').textContent=filtered.length+' ROWS';
  // Fetch accurate totals across ALL pages asynchronously
  const from=document.getElementById('dateFrom').value;const to=document.getElementById('dateTo').value;
  if(from&&to){fetchAllAmounts(from,to).then(all=>{const tot=all.filter(p=>!p.returned).reduce((s,p)=>s+parseFloat(p.amount||0),0);const ud=all.filter(p=>!p.deposited&&!p.returned).reduce((s,p)=>s+parseFloat(p.amount||0),0);document.getElementById('stat-period').textContent=fmtMoney(tot);document.getElementById('stat-undep').textContent=fmtMoney(ud);});}
}
function shortSysName(p){return p.water_systems?.system_code||p.water_systems?.system_name||'—';}

const SYS_COLORS=['#2c7ba2','#348b67','#b8822f','#bf6157','#4f8fbe','#7d8eb6','#5aad8a','#6a94b8','#d0a45a','#8fa6b4','#5f7b8c','#18384a'];
function sysColor(systemId){if(!systemId)return'rgba(255,255,255,.2)';let h=0;for(let i=0;i<systemId.length;i++){h=(h*31+systemId.charCodeAt(i))>>>0;}return SYS_COLORS[h%SYS_COLORS.length];}

function renderTable(){const area=document.getElementById('mainArea');if(!filtered.length){area.innerHTML=`<div class="empty-state"><div class="empty-icon">💵</div><div class="empty-msg">NO PAYMENTS FOUND</div><div class="empty-sub">ADJUST DATE RANGE OR SEARCH</div></div>`;return;}let html=`<table class="atable"><thead><tr><th style="width:12px"></th><th class="${sortCol==='payment_date'?'sort-'+sortDir:''}" onclick="sortBy('payment_date')">DATE</th><th onclick="sortBy('account_number')">ACCT #</th><th onclick="sortBy('payee')">PAYEE</th><th class="r ${sortCol==='amount'?'sort-'+sortDir:''}" onclick="sortBy('amount')">AMOUNT</th><th>TYPE</th><th>REFERENCE #</th><th style="text-align:center">DEP</th><th style="text-align:center">RTN</th><th style="text-align:center">IMG</th><th></th></tr></thead><tbody>`;filtered.forEach(p=>{const acctNum=p.accounts?.account_number||'—';const custName=p.accounts?.customers?.full_name||p.payee||'—';const color=sysColor(p.system_id);const isSel=selectedPayment?.payment_id===p.payment_id;const retRow=p.returned?'row-returned':'';html+=`<tr class="${retRow}${isSel?' selected':''}" onclick="openDetail('${p.payment_id}')"><td><span class="td-dot" style="background:${color};box-shadow:0 0 5px ${color}66"></span></td><td class="td-date">${fmtDate(p.payment_date)}</td><td class="td-acct" title="${acctNum}">${acctNum}</td><td class="td-name" title="${custName}">${custName}</td><td class="td-amount" style="${p.returned?'color:var(--danger);text-shadow:none':''}">${p.returned?'<span style="font-size:9px;color:var(--danger);margin-right:4px">RTN</span>':''}${fmtMoney(p.amount)}</td><td>${methodPill(p.payment_method)}</td><td class="td-ref" title="${p.reference_number||''}">${p.reference_number||'—'}</td><td class="td-flag">${p.deposited?'<span class="flag-yes">✓</span>':'<span class="flag-no">—</span>'}</td><td class="td-flag">${p.returned?'<span class="flag-ret">✕</span>':'<span class="flag-no">—</span>'}</td><td class="td-flag"><div class="img-indicator ${p.image_url?'has-img':''}" onclick="event.stopPropagation();${p.image_url?`viewImage('${p.image_url}','${acctNum} — ${fmtDate(p.payment_date)}')`:`openDetail('${p.payment_id}')`}">📷</div></td><td><button class="open-btn" onclick="event.stopPropagation();openDetail('${p.payment_id}')">···</button></td></tr>`;});html+='</tbody></table>';area.innerHTML=html;}
function sortBy(col){if(sortCol===col)sortDir=sortDir==='asc'?'desc':'asc';else{sortCol=col;sortDir='desc';}const key=col==='account_number'?p=>(p.accounts?.account_number||''):col==='payee'?p=>(p.accounts?.customers?.full_name||p.payee||''):col==='amount'?p=>parseFloat(p.amount||0):p=>(p[col]||'');filtered.sort((a,b)=>{const av=key(a),bv=key(b);return sortDir==='asc'?(av>bv?1:-1):(av<bv?1:-1);});renderTable();}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyFilters();}
function openDetail(paymentId){const p=allPayments.find(x=>x.payment_id===paymentId);if(!p)return;selectedPayment=p;panelMode='view';renderPanel();document.getElementById('detailPanel').classList.add('open');document.getElementById('mainArea').classList.add('panel-open');renderTable();}
function closePanel(){document.getElementById('detailPanel').classList.remove('open');document.getElementById('mainArea').classList.remove('panel-open');selectedPayment=null;panelMode=null;pendingImageFile=null;pendingImageUrl=null;renderTable();}
function renderPanel(){if(!selectedPayment)return;if(panelMode==='view')renderViewPanel(selectedPayment);else if(panelMode==='edit')renderEditPanel(selectedPayment);else if(panelMode==='new')renderNewPanel();}
function renderViewPanel(p){const acctNum=p.accounts?.account_number||'—';const custName=p.accounts?.customers?.full_name||p.payee||'—';document.getElementById('dp-title').textContent='💵 PAYMENT DETAIL';document.getElementById('dp-id').textContent=p.source_id||p.payment_id?.slice(0,18)+'...';const statusText=p.returned?'⚠ RETURNED/NSF':p.deposited?'✓ DEPOSITED':'● UNDEPOSITED';const statusColor=p.returned?'var(--danger)':p.deposited?'var(--success)':'var(--warning)';document.getElementById('dp-body').innerHTML=`<div class="dp-section"><div class="dp-section-title">PAYMENT</div><div class="dp-row" style="padding:14px 18px;"><div style="font-family:'Orbitron',monospace;font-size:8px;color:var(--text-muted);letter-spacing:2px;">AMOUNT</div><div class="dp-val-money">${fmtMoney(p.amount)}</div></div><div class="dp-row"><div class="dp-label">DATE</div><div class="dp-val">${fmtDate(p.payment_date)}</div></div><div class="dp-row"><div class="dp-label">METHOD</div><div class="dp-val">${methodPill(p.payment_method)}</div></div><div class="dp-row"><div class="dp-label">REFERENCE #</div><div class="dp-val">${p.reference_number||'—'}</div></div><div class="dp-row"><div class="dp-label">PAYEE</div><div class="dp-val">${p.payee||'—'}</div></div><div class="dp-row"><div class="dp-label">POSTED BY</div><div class="dp-val">${p.posted_by||'—'}</div></div><div class="dp-row"><div class="dp-label">NOTES</div><div class="dp-val" style="max-width:260px;text-align:right;word-break:break-word;font-size:10px">${p.notes||'—'}</div></div><div class="dp-row"><div class="dp-label">STATUS</div><div class="dp-val" style="color:${statusColor};font-family:'Orbitron',monospace;font-size:9px">${statusText}</div></div></div><div class="dp-section"><div class="dp-section-title">ACCOUNT</div><div class="dp-row"><div class="dp-label">ACCT #</div><div class="dp-val-acct">${acctNum}</div></div><div class="dp-row"><div class="dp-label">CUSTOMER</div><div class="dp-val">${custName}</div></div><div class="dp-row"><div class="dp-label">CYCLE</div><div class="dp-val" style="${p.in_closed_cycle?'color:var(--text-muted)':'color:var(--success)'}">${p.in_closed_cycle?'CLOSED CYCLE':'OPEN CYCLE'}</div></div></div><div class="dp-section"><div class="dp-section-title">DEPOSIT / RETURN STATUS</div><div class="toggle-row"><div class="toggle-label">DEPOSITED</div><label class="toggle"><input type="checkbox" ${p.deposited?'checked':''} onchange="quickToggle('${p.payment_id}','deposited',this.checked)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>${p.deposited?`<div class="dp-row"><div class="dp-label">DEPOSIT DATE</div><div class="dp-val">${fmtDate(p.deposit_batch_date)||'—'}</div></div>`:''}<div class="toggle-row"><div class="toggle-label">RETURNED / NSF</div><label class="toggle"><input type="checkbox" ${p.returned?'checked':''} onchange="quickToggle('${p.payment_id}','returned',this.checked)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>${p.returned?`<div class="dp-row"><div class="dp-label">RETURN DATE</div><div class="dp-val">${fmtDate(p.return_date)||'—'}</div></div><div class="dp-row"><div class="dp-label">RETURN REASON</div><div class="dp-val">${p.return_reason||'—'}</div></div>`:''}</div><div class="img-area"><div class="img-area-title">PAYMENT INSTRUMENT IMAGE</div>${p.image_url?`<img class="img-preview" src="${p.image_url}" alt="Payment image" onclick="viewImage('${p.image_url}','${acctNum} — ${fmtDate(p.payment_date)}')"><div class="img-actions"><button class="img-btn" onclick="triggerImgPicker(false)">📁 REPLACE FILE</button><button class="img-btn" onclick="triggerImgPicker(true)">📷 RECAPTURE</button><button class="img-btn" style="color:var(--danger);border-color:rgba(191,97,87,.35)" onclick="removeImage('${p.payment_id}')">✕ REMOVE</button></div>`:`<div class="img-placeholder" onclick="triggerImgPicker(false)"><span style="font-size:24px;opacity:.4">📷</span><div><div class="img-placeholder-text">CLICK TO ATTACH IMAGE</div><div class="img-placeholder-text" style="opacity:.5;margin-top:3px">CHECK · RECEIPT · MONEY ORDER</div></div></div><div class="img-actions" style="margin-top:8px"><button class="img-btn" onclick="triggerImgPicker(false)">📁 UPLOAD FILE</button><button class="img-btn" onclick="triggerImgPicker(true)">📷 CAMERA CAPTURE</button></div>`}${pendingImageUrl?`<div style="margin-top:6px;font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--warning);letter-spacing:1px">⬡ IMAGE PENDING SAVE</div>`:''}</div>`;document.getElementById('dp-footer').innerHTML=`<button class="dp-btn dp-btn-cyan" onclick="enterEditMode()">✎ EDIT</button><button class="dp-btn dp-btn-green" onclick="quickMarkDeposited('${p.payment_id}')">✓ DEPOSITED</button><button class="dp-btn dp-btn-orange" onclick="promptMarkReturned('${p.payment_id}')">⚠ RETURNED</button><button class="dp-btn dp-btn-ghost" onclick="closePanel()">✕ CLOSE</button>`;}
function enterEditMode(){panelMode='edit';renderPanel();}
function renderEditPanel(p){document.getElementById('dp-title').textContent='✎ EDIT PAYMENT';document.getElementById('dp-id').textContent=p.source_id||p.payment_id?.slice(0,18)+'...';document.getElementById('dp-body').innerHTML=`<div class="dp-form"><div class="ef-row2"><div><label class="ef-label">PAYMENT DATE</label><input class="ef-input" type="date" id="ef-date" value="${p.payment_date||''}"></div><div><label class="ef-label">AMOUNT</label><input class="ef-input" type="number" step="0.01" id="ef-amount" value="${p.amount||''}"></div></div><div class="ef-row2"><div><label class="ef-label">METHOD</label><select class="ef-input" id="ef-method">${['CHECK','CASH','SQUARE','ACH','MONEY ORDER','OTHER'].map(m=>`<option ${(p.payment_method||'').toUpperCase()===m?'selected':''}>${m}</option>`).join('')}</select></div><div><label class="ef-label">REFERENCE #</label><input class="ef-input" type="text" id="ef-ref" value="${p.reference_number||''}" placeholder="Check #, ID..."></div></div><div class="ef-row"><label class="ef-label">PAYEE</label><input class="ef-input" type="text" id="ef-payee" value="${p.payee||''}"></div><div class="ef-row"><label class="ef-label">NOTES</label><input class="ef-input" type="text" id="ef-notes" value="${p.notes||''}" placeholder="Optional notes"></div><div class="ef-row2"><div><label class="ef-label">DEPOSIT DATE</label><input class="ef-input" type="date" id="ef-dep-date" value="${p.deposit_batch_date||''}"></div><div><label class="ef-label">RETURN REASON</label><input class="ef-input" type="text" id="ef-ret-reason" value="${p.return_reason||''}" placeholder="NSF, CLOSED, etc."></div></div></div>`;document.getElementById('dp-footer').innerHTML=`<button class="dp-btn dp-btn-green" onclick="saveEdit('${p.payment_id}')">✓ SAVE</button><button class="dp-btn dp-btn-ghost" onclick="panelMode='view';renderPanel()">✕ CANCEL</button>`;}
async function saveEdit(paymentId){const updates={payment_date:document.getElementById('ef-date')?.value||null,amount:parseFloat(document.getElementById('ef-amount')?.value)||null,payment_method:document.getElementById('ef-method')?.value||null,reference_number:document.getElementById('ef-ref')?.value.trim()||null,payee:document.getElementById('ef-payee')?.value.trim()||null,notes:document.getElementById('ef-notes')?.value.trim()||null,deposit_batch_date:document.getElementById('ef-dep-date')?.value||null,return_reason:document.getElementById('ef-ret-reason')?.value.trim()||null};if(!updates.payment_date||!updates.amount){toast('DATE AND AMOUNT REQUIRED','err');return;}if(pendingImageFile){const url=await uploadImage(pendingImageFile,paymentId);if(url){updates.image_url=url;pendingImageFile=null;pendingImageUrl=null;}}const result=await supa('payments',`?payment_id=eq.${paymentId}`,'PATCH',updates);if(result){const idx=allPayments.findIndex(p=>p.payment_id===paymentId);if(idx>-1){allPayments[idx]={...allPayments[idx],...updates};selectedPayment=allPayments[idx];}panelMode='view';renderPanel();applyFilters();toast('PAYMENT UPDATED','ok');}else{toast('ERROR SAVING — CHECK CONSOLE','err');}}
function openNewPayment(){selectedPayment=null;panelMode='new';pendingImageFile=null;pendingImageUrl=null;document.getElementById('dp-title').textContent='+ POST PAYMENT';document.getElementById('dp-id').textContent='NEW RECORD';renderNewPanel();document.getElementById('detailPanel').classList.add('open');document.getElementById('mainArea').classList.add('panel-open');}
function renderNewPanel(){document.getElementById('dp-body').innerHTML=`<div class="dp-form"><div class="ef-row"><label class="ef-label">ACCOUNT # <span style="color:var(--danger)">*</span></label><input class="ef-input" type="text" id="nf-acct" list="acct-dl" placeholder="e.g. DRBY01" autocomplete="off"><div id="nf-acct-confirm" style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--success);letter-spacing:1px;margin-top:4px;min-height:14px;"></div></div><div class="ef-row2"><div><label class="ef-label">PAYMENT DATE <span style="color:var(--danger)">*</span></label><input class="ef-input" type="date" id="nf-date" value="${today()}"></div><div><label class="ef-label">AMOUNT <span style="color:var(--danger)">*</span></label><input class="ef-input" type="number" step="0.01" id="nf-amount" placeholder="0.00"></div></div><div class="ef-row2"><div><label class="ef-label">METHOD</label><select class="ef-input" id="nf-method"><option>CHECK</option><option>CASH</option><option>SQUARE</option><option>ACH</option><option>MONEY ORDER</option><option>OTHER</option></select></div><div><label class="ef-label">REFERENCE #</label><input class="ef-input" type="text" id="nf-ref" placeholder="Check #, ID..."></div></div><div class="ef-row"><label class="ef-label">NOTES</label><input class="ef-input" type="text" id="nf-notes" placeholder="Optional notes"></div><div class="img-area" style="padding:0;border:none;margin-top:14px;"><div class="img-area-title">PAYMENT INSTRUMENT IMAGE</div><div id="nf-img-preview"><div class="img-placeholder" onclick="triggerImgPicker(false)" style="margin-top:6px"><span style="font-size:24px;opacity:.4">📷</span><div><div class="img-placeholder-text">CLICK TO ATTACH IMAGE</div></div></div></div><div class="img-actions" style="margin-top:8px"><button class="img-btn" onclick="triggerImgPicker(false)">📁 UPLOAD FILE</button><button class="img-btn" onclick="triggerImgPicker(true)">📷 CAMERA CAPTURE</button></div></div></div>`;setTimeout(()=>{const inp=document.getElementById('nf-acct');if(inp)inp.addEventListener('input',e=>{const match=allAccounts.find(a=>a.account_number===e.target.value.trim());const el=document.getElementById('nf-acct-confirm');if(el)el.textContent=match?'✓ '+(match.customers?.full_name||'ACCOUNT FOUND'):(e.target.value?'✗ NOT FOUND':'');});},50);document.getElementById('dp-footer').innerHTML=`<button class="dp-btn dp-btn-green" onclick="submitNewPayment()">✓ POST PAYMENT</button><button class="dp-btn dp-btn-ghost" onclick="closePanel()">✕ CANCEL</button>`;}
async function submitNewPayment(){const acctNum=document.getElementById('nf-acct')?.value.trim();const date=document.getElementById('nf-date')?.value;const amount=parseFloat(document.getElementById('nf-amount')?.value);const method=document.getElementById('nf-method')?.value;const ref=document.getElementById('nf-ref')?.value.trim();const notes=document.getElementById('nf-notes')?.value.trim();if(!acctNum||!date||!amount||isNaN(amount)||amount<=0){toast('ACCOUNT, DATE, AND AMOUNT REQUIRED','err');return;}const acct=allAccounts.find(a=>a.account_number===acctNum);if(!acct){toast('ACCOUNT NOT FOUND: '+acctNum,'err');return;}const sourceId=`${acctNum}-PAY-${date}-${Date.now()}`;const body={account_id:acct.account_id,system_id:activeSystemId,payment_date:date,amount,payment_method:method,reference_number:ref||null,notes:notes||null,deposited:false,returned:false,return_debit_posted:false,in_closed_cycle:false,source_id:sourceId,posted_by:'ADMIN'};const result=await supa('payments','','POST',body);if(!result){toast('ERROR POSTING PAYMENT','err');return;}const newPay=Array.isArray(result)?result[0]:result;if(pendingImageFile&&newPay?.payment_id){const url=await uploadImage(pendingImageFile,newPay.payment_id);if(url){await supa('payments',`?payment_id=eq.${newPay.payment_id}`,'PATCH',{image_url:url});newPay.image_url=url;}}if(newPay){newPay.accounts={account_number:acctNum,customers:acct.customers};allPayments.unshift(newPay);}toast(`PAYMENT POSTED — ${acctNum} — ${fmtMoney(amount)}`,'ok',3500);loadStats(document.getElementById('dateFrom').value,document.getElementById('dateTo').value);closePanel();applyFilters();}
async function quickToggle(paymentId,field,value){const updates={[field]:value};if(field==='deposited'&&value)updates.deposit_batch_date=today();if(field==='returned'&&value)updates.return_date=today();const result=await supa('payments',`?payment_id=eq.${paymentId}`,'PATCH',updates);if(result){const idx=allPayments.findIndex(p=>p.payment_id===paymentId);if(idx>-1){allPayments[idx]={...allPayments[idx],...updates};if(selectedPayment?.payment_id===paymentId)selectedPayment=allPayments[idx];}renderPanel();applyFilters();}else{toast('ERROR UPDATING','err');}}
async function quickMarkDeposited(paymentId){await quickToggle(paymentId,'deposited',true);toast('MARKED AS DEPOSITED','ok');}
async function promptMarkReturned(paymentId){const reason=prompt('RETURN REASON (NSF, CLOSED ACCOUNT, etc.):');if(reason===null)return;const updates={returned:true,return_date:today(),return_reason:reason||'NSF',deposited:false};const result=await supa('payments',`?payment_id=eq.${paymentId}`,'PATCH',updates);if(result){const idx=allPayments.findIndex(p=>p.payment_id===paymentId);if(idx>-1){allPayments[idx]={...allPayments[idx],...updates};selectedPayment=allPayments[idx];}renderPanel();applyFilters();toast('PAYMENT MARKED AS RETURNED','warn');}else{toast('ERROR UPDATING','err');}}
function triggerImgPicker(camera){document.getElementById(camera?'imgCamInput':'imgFileInput').click();}
function handleImageFile(event,isCamera){const file=event.target.files[0];if(!file)return;pendingImageFile=file;const url=URL.createObjectURL(file);pendingImageUrl=url;const previewTarget=panelMode==='new'?document.getElementById('nf-img-preview'):null;if(previewTarget){previewTarget.innerHTML=`<img class="img-preview" src="${url}" onclick="viewImage('${url}','PREVIEW')">`;}else{renderPanel();}toast('📷 IMAGE ATTACHED — SAVE TO UPLOAD','');event.target.value='';}
async function uploadImage(file,paymentId){const ext=(file.name||'image.jpg').split('.').pop().toLowerCase();const fname=`${paymentId}-${Date.now()}.${ext}`;try{const r=await fetch(`${SUPA_URL}/storage/v1/object/${BUCKET}/${fname}`,{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':file.type||'image/jpeg'},body:file});if(!r.ok){toast('IMAGE UPLOAD FAILED','err');return null;}return`${SUPA_URL}/storage/v1/object/public/${BUCKET}/${fname}`;}catch(e){toast('IMAGE UPLOAD ERROR','err');return null;}}
async function removeImage(paymentId){const r=await supa('payments',`?payment_id=eq.${paymentId}`,'PATCH',{image_url:null});if(r){const idx=allPayments.findIndex(p=>p.payment_id===paymentId);if(idx>-1){allPayments[idx].image_url=null;selectedPayment=allPayments[idx];}renderPanel();applyFilters();toast('IMAGE REMOVED','');}}
async function ensureImageBucket(){try{const r=await fetch(`${SUPA_URL}/storage/v1/bucket/${BUCKET}`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}});if(r.status===404||r.status===400){await fetch(`${SUPA_URL}/storage/v1/bucket`,{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json'},body:JSON.stringify({id:BUCKET,name:BUCKET,public:true})});}}catch(e){console.warn('Bucket check failed:',e.message);}}
function viewImage(url,caption){document.getElementById('lb-img').src=url;document.getElementById('lb-caption').textContent=caption||'';document.getElementById('lightbox').classList.add('show');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show');}
function exportCSV(){if(!filtered.length){toast('NO DATA TO EXPORT','err');return;}const headers=['DATE','ACCOUNT','CUSTOMER','AMOUNT','METHOD','REFERENCE','DEPOSITED','RETURNED','POSTED_BY','NOTES'];const rows=filtered.map(p=>[p.payment_date,p.accounts?.account_number||'',p.accounts?.customers?.full_name||p.payee||'',p.amount,p.payment_method||'',p.reference_number||'',p.deposited?'YES':'NO',p.returned?'YES':'NO',p.posted_by||'',(p.notes||'').replace(/,/g,';')]);const csv=[headers,...rows].map(r=>r.join(',')).join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=`payments-${document.getElementById('dateFrom').value}-to-${document.getElementById('dateTo').value}.csv`;a.click();toast('CSV EXPORTED','ok');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();if(e.key==='/'&&document.activeElement!==document.getElementById('searchInput')){e.preventDefault();document.getElementById('searchInput').focus();}});
window.addEventListener('DOMContentLoaded',loadSystems);
</script>
</script>
